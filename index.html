<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>82to43</title>
  <meta name="description" content="Curated, untamed, yours. A transcontinental data flow, a flawless loop." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Barlow:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --white: #ffffff;
      --black: #000000;
      --off-white: #e8e4dc;
      --btn-border: rgba(255,255,255,0.75);
      --btn-hover-bg: rgba(255,255,255,0.12);
      --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      overflow-x: hidden;
    }

    /* ── HERO / FULL PAGE ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    /* Background image via CSS — replace with your own photo if desired */
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('82to43_background.webp');
      background-size: cover;
      background-position: center;
      filter: brightness(0.28) saturate(0.6);
      z-index: 0;
    }

    /* Subtle grain overlay */
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 920px;
      width: 100%;
      animation: fadeUp 1s ease both;
    }

    /* ── LOGO / TITLE ── */
    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(4.5rem, 14vw, 9rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--white);
      text-shadow:
        0 0 40px rgba(255,255,255,0.55),
        0 0 90px rgba(255,255,255,0.2);
      margin-bottom: 1rem;
      animation: fadeUp 0.9s 0.1s ease both;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.1rem, 2.4vw, 1.5rem);
      letter-spacing: 0.22em;
      color: var(--off-white);
      margin-bottom: 1.6rem;
      animation: fadeUp 0.9s 0.22s ease both;
    }

    .description {
      font-family: 'Barlow', sans-serif;
      font-weight: 400;
      font-size: clamp(0.82rem, 1.5vw, 1rem);
      line-height: 1.75;
      color: rgba(255,255,255,0.62);
      max-width: 680px;
      margin: 0 auto 3.2rem;
      animation: fadeUp 0.9s 0.34s ease both;
    }

    /* ── BUTTON GRID ── */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      max-width: 920px;
      margin: 0 auto;
      animation: fadeUp 0.9s 0.48s ease both;
    }

    .btn-grid .btn-full {
      grid-column: 1 / -1;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem 2rem;
      border: 1px solid var(--btn-border);
      background: rgba(0, 0, 0, 0.35);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition:
        background var(--transition),
        border-color var(--transition),
        transform var(--transition),
        box-shadow var(--transition);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }

    .btn:hover,
    .btn:focus-visible {
      background: var(--btn-hover-bg);
      border-color: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 6px 32px rgba(255,255,255,0.08);
      outline: none;
    }

    .btn:active {
      transform: translateY(0);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .btn-grid {
        grid-template-columns: 1fr;
      }
      .btn-grid .btn-full {
        grid-column: 1;
      }
    }
  </style>
</head>
<body>

  <section class="hero" aria-label="82to43 landing page">
    <div class="hero-bg" role="presentation"></div>

    <div class="hero-content">
      <h1 class="logo">82to43</h1>
      <p class="tagline">Curated, untamed, yours.</p>
      <p class="description">
        Launched in 2025, our journey has evolved into a single, collective heartbeat<br>
        with artists from the farthest corners of the globe.<br>
        A transcontinental data flow, a flawless loop.
      </p>

      <nav class="btn-grid" aria-label="External links">
        <a class="btn" href="https://www.beatport.com/label/82-to-43/89795" target="_blank" rel="noopener noreferrer">Beatport</a>
        <a class="btn" href="https://soundcloud.com/82to43" target="_blank" rel="noopener noreferrer">SoundCloud</a>
        <a class="btn" href="https://instagram.com/82to43_" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a class="btn" href="mailto:info@82to43.com">Get in Touch!</a>
        <a class="btn btn-full" href="mailto:demo@82to43.com">Send Your Demo</a>
      </nav>
    </div>
  </section>

</body>
</html>
